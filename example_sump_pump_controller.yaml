# this is a simple test device setup that's used to compile and test the examples
# esphome:
#   name: components_test
#   build_path: build/components_test
esphome:
  name: sump-test
  friendly_name: sump test

esp32:
  board: esp32-c3-devkitm-1
  # framework:
  #   type: arduino

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

ota:
  - platform: esphome
    password: !secret OTA_password

# Enable Home Assistant API
api:
  encryption:
    key: !secret hassio_API_key

logger:

web_server:
  port: 80

external_components:
  - source:
      type: local
      path: Components
    refresh: always
    components:
      - sump_pump_controller

sump_pump_controller:
  id: "SumpPumpTestID"

switch:
  - platform: sump_pump_controller
    sump_pump_controller_ID: SumpPumpTestID
    manual_mode_switch:
      name: Manual Mode
    pump_switch:
      name: Pump
    battery_charger_switch:
      name: Battery Charger


